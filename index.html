<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #dde1ea;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #4f6ef7;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3a58e2;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #dde1ea;
      border-radius: 8px;
      background: #fff;
      color: #555;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #4f6ef7;
      color: #4f6ef7;
      font-weight: 600;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
    }

    .task-item.done {
      opacity: 0.55;
    }

    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      color: #1a1a2e;
      word-break: break-word;
      cursor: text;
      border: 2px solid transparent;
      border-radius: 6px;
      padding: 4px 6px;
      outline: none;
      transition: border-color 0.2s;
      background: transparent;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .task-text:focus {
      border-color: #4f6ef7;
      background: #f7f8ff;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-delete {
      background: #fde8e8;
      color: #e53e3e;
    }

    .btn-delete:hover {
      background: #f8b4b4;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .count {
      text-align: right;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTask()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <div class="count" id="count"></div>
    <div class="task-list" id="taskList"></div>
    <div class="empty" id="empty" style="display:none">Görev yok.</div>
    <div class="loading" id="loading">Yükleniyor...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://uzkscrrqyxftbtwkiyra.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6a3NjcnJxeXhmdGJ0d2tpeXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkxNDMsImV4cCI6MjA5MjI4NTE0M30.wA7g4SVacghNunC0nt6ZP3SgHZ6U6LAWu3ggUrypBxE';
    const HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let tasks = [];
    let filter = 'all';
    let editTimers = {};

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { ...HEADERS, ...options.headers }
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function loadTasks() {
      document.getElementById('loading').style.display = 'block';
      tasks = await api('/todos?order=created_at.desc');
      document.getElementById('loading').style.display = 'none';
      render();
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const [task] = await api('/todos', {
        method: 'POST',
        body: JSON.stringify({ text, done: false })
      });
      tasks.unshift(task);
      render();
    }

    async function toggleTask(task) {
      await api(`/todos?id=eq.${task.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ done: !task.done })
      });
      task.done = !task.done;
      render();
    }

    async function deleteTask(id) {
      await api(`/todos?id=eq.${id}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function scheduleUpdate(task, text) {
      clearTimeout(editTimers[task.id]);
      editTimers[task.id] = setTimeout(async () => {
        await api(`/todos?id=eq.${task.id}`, {
          method: 'PATCH',
          body: JSON.stringify({ text })
        });
        task.text = text;
      }, 600);
    }

    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('empty');
      const count = document.getElementById('count');

      const visible = tasks.filter(t =>
        filter === 'all' ? true :
        filter === 'done' ? t.done :
        !t.done
      );

      const remaining = tasks.filter(t => !t.done).length;
      count.textContent = `${remaining} görev kaldı`;
      list.innerHTML = '';

      if (visible.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        visible.forEach(task => {
          const item = document.createElement('div');
          item.className = 'task-item' + (task.done ? ' done' : '');

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = task.done;
          cb.addEventListener('change', () => toggleTask(task));

          const textarea = document.createElement('textarea');
          textarea.className = 'task-text';
          textarea.value = task.text;
          textarea.rows = 1;
          textarea.spellcheck = false;
          textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            scheduleUpdate(task, textarea.value);
          });
          textarea.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              textarea.blur();
            }
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-icon btn-delete';
          delBtn.title = 'Sil';
          delBtn.innerHTML = '&#10005;';
          delBtn.addEventListener('click', () => deleteTask(task.id));

          const actions = document.createElement('div');
          actions.className = 'task-actions';
          actions.appendChild(delBtn);

          item.appendChild(cb);
          item.appendChild(textarea);
          item.appendChild(actions);
          list.appendChild(item);

          textarea.style.height = textarea.scrollHeight + 'px';
        });
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
