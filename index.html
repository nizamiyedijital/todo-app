<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px 60px;
    }

    .container { width: 100%; max-width: 560px; }

    /* ── Auth ── */
    #authBox {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      margin-top: 20px;
    }

    #authBox h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    #authBox .subtitle {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 28px;
    }

    #authBox h2 {
      text-align: center;
      color: #1a1a2e;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e8ecf4;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbff;
    }

    .field input:focus { border-color: #4f6ef7; background: #fff; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .auth-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 0.88rem;
      color: #777;
    }

    .auth-switch a {
      color: #4f6ef7;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      display: none;
    }

    .msg.error   { background: #fff0f0; color: #c53030; border: 1px solid #fcc; display: block; }
    .msg.success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; display: block; }

    /* ── App ── */
    #appBox { display: none; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-top: 4px;
    }

    .app-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; }

    .btn-logout {
      padding: 7px 16px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .btn-logout:hover { background: #f7f8fc; border-color: #c8d0e0; }

    /* ── Stats Panel ── */
    .stats-panel {
      background: linear-gradient(135deg, #4f6ef7 0%, #7c3aed 100%);
      border-radius: 20px;
      padding: 20px 24px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 6px 24px rgba(79,110,247,0.35);
    }

    .stats-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .level-badge {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .level-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
    .level-num { font-size: 1.5rem; font-weight: 800; line-height: 1; }

    .stats-info { flex: 1; }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 6px;
    }

    .stat-item { display: flex; align-items: center; gap: 5px; font-size: 0.88rem; opacity: 0.95; }
    .stat-item strong { font-weight: 700; font-size: 1rem; }

    .xp-bar-wrap { position: relative; }
    .xp-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .xp-bar {
      height: 8px;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      background: #fff;
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── Badges ── */
    .badges-row {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .badges-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .badges-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .badge-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: transform 0.15s;
    }

    .badge-pill:hover { transform: scale(1.05); }
    .badge-pill.earned { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .badge-pill.locked { background: #f7f8fc; color: #ccc; border: 1px solid #eee; filter: grayscale(1); }

    /* ── Category Filter ── */
    .cat-filter {
      display: flex;
      gap: 7px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .cat-filter::-webkit-scrollbar { display: none; }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid #e8ecf4;
      background: #fff;
      font-size: 0.83rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      font-weight: 500;
      color: #555;
    }

    .cat-btn:hover { border-color: #c8d0e0; background: #f7f8fc; }
    .cat-btn.active { color: #fff; border-color: transparent; }

    /* ── Add Task ── */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .add-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8ecf4;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .add-row input:focus { border-color: #4f6ef7; }

    .add-row button {
      padding: 12px 20px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-row button:hover { background: #3a58e2; transform: translateY(-1px); }
    .add-row button:active { transform: translateY(0); }

    /* Category picker for add form */
    .cat-picker {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .cat-pick-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid #e8ecf4;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
      color: #555;
      transition: all 0.15s;
    }

    .cat-pick-btn:hover { border-color: #c8d0e0; }
    .cat-pick-btn.selected { color: #fff; border-color: transparent; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e8ecf4;
      border-radius: 10px;
      background: #fff;
      color: #666;
      font-size: 0.83rem;
      cursor: pointer;
      transition: all 0.18s;
      font-weight: 500;
    }

    .filters button.active {
      border-color: #4f6ef7;
      color: #4f6ef7;
      background: #f0f3ff;
      font-weight: 600;
    }

    /* ── Task List ── */
    .task-list { display: flex; flex-direction: column; gap: 9px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      transition: opacity 0.25s, transform 0.15s;
      position: relative;
      overflow: visible;
    }

    .task-item:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.09); }
    .task-item.done { opacity: 0.5; }

    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .task-body { flex: 1; min-width: 0; }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .cat-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    .xp-tag {
      font-size: 0.72rem;
      font-weight: 600;
      color: #f59e0b;
      background: #fffbeb;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid #fde68a;
    }

    .due-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }

    .due-tag.future  { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .due-tag.today   { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .due-tag.overdue { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

    .datetime-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .datetime-row input[type="datetime-local"] {
      flex: 1;
      padding: 9px 12px;
      border: 2px solid #e8ecf4;
      border-radius: 10px;
      font-size: 0.88rem;
      outline: none;
      background: #fff;
      color: #333;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .datetime-row input[type="datetime-local"]:focus { border-color: #4f6ef7; }

    .datetime-row .clear-date {
      padding: 8px 12px;
      border: 2px solid #e8ecf4;
      border-radius: 10px;
      background: #fff;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .datetime-row .clear-date:hover { border-color: #fca5a5; color: #dc2626; background: #fff5f5; }

    .task-text {
      width: 100%;
      font-size: 0.95rem;
      color: #1a1a2e;
      word-break: break-word;
      border: 2px solid transparent;
      border-radius: 6px;
      padding: 3px 5px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      background: transparent;
      font-family: inherit;
      resize: none;
      line-height: 1.45;
    }

    .task-item.done .task-text { text-decoration: line-through; color: #aaa; }
    .task-text:focus { border-color: #4f6ef7; background: #f7f8ff; }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; padding-top: 2px; }

    .btn-del {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      background: #fff0f0;
      color: #e53e3e;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }

    .btn-del:hover { background: #fed7d7; }

    /* ── XP Float Animation ── */
    .xp-float {
      position: absolute;
      left: 14px;
      top: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #f59e0b;
      pointer-events: none;
      animation: floatUp 1.2s ease-out forwards;
      z-index: 10;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-28px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-52px) scale(0.9); }
    }

    /* ── Badge Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e;
      color: #fff;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
      opacity: 0;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Misc ── */
    .count { text-align: right; font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
    .empty { text-align: center; color: #ccc; padding: 40px 0; font-size: 0.92rem; }
    .loading-wrap { text-align: center; color: #ccc; padding: 32px 0; }

    .level-up-msg {
      text-align: center;
      font-weight: 700;
      color: #4f6ef7;
      font-size: 1rem;
      padding: 8px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0%   { transform: scale(0.8); opacity: 0; }
      70%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Auth -->
  <div id="authBox">
    <h1>✅ Yapılacaklar</h1>
    <p class="subtitle">Görevleri tamamla, XP kazan, seviye atla!</p>
    <h2 id="authTitle">Giriş Yap</h2>
    <div id="authMsg" class="msg"></div>
    <div class="field">
      <label>E-posta</label>
      <input type="email" id="authEmail" placeholder="ornek@mail.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" id="authPassword" placeholder="En az 6 karakter" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="authBtn" onclick="submitAuth()">Giriş Yap</button>
    <div class="auth-switch">
      Hesabın yok mu? <a onclick="toggleMode()">Kayıt Ol</a>
    </div>
  </div>

  <!-- App -->
  <div id="appBox">

    <div class="topbar">
      <span class="app-title">✅ Yapılacaklar</span>
      <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
    </div>

    <!-- Stats -->
    <div class="stats-panel">
      <div class="stats-top">
        <div class="level-badge">
          <span class="level-label">SEVİYE</span>
          <span class="level-num" id="statLevel">1</span>
        </div>
        <div class="stats-info">
          <div class="stats-row">
            <div class="stat-item">⚡ <strong id="statXP">0</strong> XP</div>
            <div class="stat-item">🔥 <strong id="statStreak">0</strong> Gün Seri</div>
            <div class="stat-item">✅ <strong id="statDone">0</strong> Tamamlandı</div>
          </div>
          <div class="xp-bar-wrap">
            <div class="xp-label">
              <span id="xpBarLabel">0 / 100 XP</span>
              <span id="xpNextLabel">Sonraki seviye</span>
            </div>
            <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Badges -->
    <div class="badges-row">
      <div class="badges-title">🏅 Rozetler</div>
      <div class="badges-list" id="badgesList"></div>
    </div>

    <!-- Category filter -->
    <div class="cat-filter" id="catFilter"></div>

    <!-- Add task -->
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTask()">+ Ekle</button>
    </div>
    <div class="datetime-row">
      <input type="datetime-local" id="taskDue" title="Bitiş tarihi ve saati (isteğe bağlı)" />
      <button class="clear-date" onclick="document.getElementById('taskDue').value=''">✕ Tarih</button>
    </div>
    <div class="cat-picker" id="catPicker"></div>

    <!-- Done/active filter -->
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <div class="count" id="count"></div>
    <div class="task-list" id="taskList"></div>
    <div class="empty" id="empty" style="display:none">Görev yok.</div>
    <div class="loading-wrap" id="loadingWrap">Yükleniyor...</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SB   = 'https://uzkscrrqyxftbtwkiyra.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6a3NjcnJxeXhmdGJ0d2tpeXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkxNDMsImV4cCI6MjA5MjI4NTE0M30.wA7g4SVacghNunC0nt6ZP3SgHZ6U6LAWu3ggUrypBxE';
const APP_URL = 'https://nizamiyedijital.github.io/todo-app';

const CATEGORIES = [
  { id: 'genel',    label: 'Genel',    icon: '📋', color: '#718096', xp: 10 },
  { id: 'iş',       label: 'İş',       icon: '💼', color: '#3b82f6', xp: 15 },
  { id: 'sağlık',   label: 'Sağlık',   icon: '🏃', color: '#22c55e', xp: 20 },
  { id: 'akademik', label: 'Akademik', icon: '📚', color: '#a855f7', xp: 15 },
  { id: 'beslenme', label: 'Beslenme', icon: '🥗', color: '#f97316', xp: 12 },
];

const BADGES = [
  { id: 'first_task',  icon: '🌱', label: 'İlk Adım',       check: (s) => s.completed_count >= 1 },
  { id: 'tasks_5',     icon: '⚡', label: 'Hızlı Başlangıç', check: (s) => s.completed_count >= 5 },
  { id: 'tasks_25',    icon: '🏆', label: 'Azimli',          check: (s) => s.completed_count >= 25 },
  { id: 'tasks_100',   icon: '👑', label: 'Uzman',           check: (s) => s.completed_count >= 100 },
  { id: 'streak_3',    icon: '🔥', label: '3 Günlük Seri',   check: (s) => s.streak >= 3 },
  { id: 'streak_7',    icon: '💫', label: '7 Günlük Seri',   check: (s) => s.streak >= 7 },
  { id: 'health_10',   icon: '💪', label: 'Sağlıklı Yaşam',  check: (s, c) => (c?.['sağlık'] || 0) >= 10 },
  { id: 'academic_10', icon: '📖', label: 'Akademisyen',     check: (s, c) => (c?.['akademik'] || 0) >= 10 },
];

function catByID(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[0]; }
function xpForLevel(lvl) { return lvl * 100; }
function levelFromXP(xp) { let l = 1, t = 0; while (t + xpForLevel(l) <= xp) { t += xpForLevel(l); l++; } return { level: l, xpInLevel: xp - t, xpNeeded: xpForLevel(l) }; }

let session = null;
let tasks   = [];
let stats   = { xp: 0, streak: 0, last_activity_date: null, completed_count: 0, badges: [] };
let filter  = 'all';
let catFilter = 'all';
let selectedCat = 'genel';
let editTimers  = {};
let isRegisterMode = false;

/* ── Session ──────────────────────────────────────────────── */
function jwtPayload(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch { return {}; } }

function saveSession(s) {
  if (s.access_token && !s.user?.id) {
    const p = jwtPayload(s.access_token);
    s.user = { ...(s.user || {}), id: p.sub, email: s.user?.email || p.email || '' };
  }
  session = s;
  localStorage.setItem('sb_session', JSON.stringify(s));
}

function clearSession() { session = null; localStorage.removeItem('sb_session'); }

function authHeaders(extra = {}) {
  return {
    'apikey': ANON,
    'Authorization': `Bearer ${session.access_token}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
    ...extra
  };
}

/* ── API ──────────────────────────────────────────────────── */
async function authPost(path, body) {
  const res = await fetch(`${SB}/auth/v1${path}`, {
    method: 'POST',
    headers: { apikey: ANON, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const d = await res.json();
  if (!res.ok) throw new Error(d.error_description || d.msg || d.error || 'Hata oluştu');
  return d;
}

async function db(path, options = {}) {
  const res = await fetch(`${SB}/rest/v1${path}`, {
    ...options,
    headers: { ...authHeaders(), ...options.headers }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

/* ── Stats ────────────────────────────────────────────────── */
async function loadStats() {
  const rows = await db(`/user_stats?user_id=eq.${session.user.id}&select=*`);
  if (rows && rows.length > 0) {
    stats = rows[0];
    stats.badges = stats.badges || [];
  }
}

async function saveStats(patch) {
  Object.assign(stats, patch);
  await db('/user_stats', {
    method: 'POST',
    body: JSON.stringify({ user_id: session.user.id, ...stats }),
    headers: { Prefer: 'resolution=merge-duplicates,return=representation' }
  });
}

async function getCategoryCounts() {
  const rows = await db(`/todos?user_id=eq.${session.user.id}&done=eq.true&select=category`);
  const counts = {};
  (rows || []).forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });
  return counts;
}

function computeStreak(lastDate) {
  if (!lastDate) return 1;
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastDate === today)      return stats.streak;
  if (lastDate === yesterday)  return stats.streak + 1;
  return 1;
}

async function onTaskCompleted(task) {
  const cat  = catByID(task.category);
  const xpGain = cat.xp;
  const newXP  = stats.xp + xpGain;
  const today  = new Date().toISOString().slice(0, 10);
  const newStreak = computeStreak(stats.last_activity_date);
  const newCount  = stats.completed_count + 1;

  const prevLevel = levelFromXP(stats.xp).level;
  const nextLevel = levelFromXP(newXP).level;

  await saveStats({
    xp: newXP,
    streak: newStreak,
    last_activity_date: today,
    completed_count: newCount,
  });

  renderStats();

  if (nextLevel > prevLevel) {
    showToast(`🎉 Seviye Atladın! Seviye ${nextLevel}'e ulaştın!`);
  }

  const catCounts = await getCategoryCounts();
  const newBadges = checkBadges(catCounts);
  if (newBadges.length > 0) {
    const updated = [...new Set([...stats.badges, ...newBadges])];
    await saveStats({ badges: updated });
    newBadges.forEach(bid => {
      const b = BADGES.find(x => x.id === bid);
      if (b) setTimeout(() => showToast(`${b.icon} Rozet Kazandın: ${b.label}!`), 600);
    });
    renderBadges();
  }

  return xpGain;
}

function checkBadges(catCounts) {
  const newOnes = [];
  for (const b of BADGES) {
    if (!stats.badges.includes(b.id) && b.check(stats, catCounts)) {
      newOnes.push(b.id);
    }
  }
  return newOnes;
}

/* ── Auth UI ──────────────────────────────────────────────── */
function setMsg(text, type) {
  const el = document.getElementById('authMsg');
  el.className = `msg ${type}`;
  el.textContent = text;
}

function toggleMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authTitle').textContent    = isRegisterMode ? 'Kayıt Ol' : 'Giriş Yap';
  document.getElementById('authBtn').textContent      = isRegisterMode ? 'Kayıt Ol' : 'Giriş Yap';
  document.querySelector('.auth-switch').innerHTML    = isRegisterMode
    ? 'Zaten hesabın var mı? <a onclick="toggleMode()">Giriş Yap</a>'
    : 'Hesabın yok mu? <a onclick="toggleMode()">Kayıt Ol</a>';
  document.getElementById('authMsg').className = 'msg';
}

async function submitAuth() {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn      = document.getElementById('authBtn');
  if (!email || !password) { setMsg('E-posta ve şifre giriniz.', 'error'); return; }
  if (password.length < 6) { setMsg('Şifre en az 6 karakter olmalı.', 'error'); return; }
  btn.disabled = true;
  try {
    if (isRegisterMode) {
      await authPost(`/signup?redirect_to=${encodeURIComponent(APP_URL)}`, { email, password });
      setMsg('Kayıt başarılı! E-postanıza gelen onay bağlantısına tıklayın.', 'success');
      document.getElementById('authPassword').value = '';
    } else {
      const data = await authPost('/token?grant_type=password', { email, password });
      saveSession(data);
      await initApp();
    }
  } catch (e) {
    setMsg(e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function logout() { clearSession(); showAuth(); }

/* ── View ─────────────────────────────────────────────────── */
function showAuth() {
  document.getElementById('authBox').style.display  = 'block';
  document.getElementById('appBox').style.display   = 'none';
}

async function initApp() {
  document.getElementById('authBox').style.display  = 'none';
  document.getElementById('appBox').style.display   = 'block';
  buildCatUI();
  await Promise.all([loadStats(), loadTasks()]);
  renderStats();
  renderBadges();
}

/* ── Category UI ─────────────────────────────────────────── */
function buildCatUI() {
  // Filter bar
  const cf = document.getElementById('catFilter');
  cf.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = '📋 Tümü';
  allBtn.onclick = () => { catFilter = 'all'; setActiveCatBtn(allBtn, cf); render(); };
  cf.appendChild(allBtn);

  CATEGORIES.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-btn';
    b.innerHTML = `${cat.icon} ${cat.label}`;
    b.style.setProperty('--cat-color', cat.color);
    b.dataset.catId = cat.id;
    b.onclick = () => { catFilter = cat.id; setActiveCatBtn(b, cf); render(); };
    cf.appendChild(b);
  });

  // Picker (add form)
  const cp = document.getElementById('catPicker');
  cp.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-pick-btn' + (cat.id === selectedCat ? ' selected' : '');
    b.style.background = cat.id === selectedCat ? cat.color : '';
    b.style.borderColor = cat.id === selectedCat ? cat.color : '';
    b.innerHTML = `${cat.icon} ${cat.label} <small style="opacity:.7">+${cat.xp}XP</small>`;
    b.dataset.catId = cat.id;
    b.onclick = () => selectCat(cat.id);
    cp.appendChild(b);
  });
}

function setActiveCatBtn(active, container) {
  container.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
  });
  active.classList.add('active');
  const cid = active.dataset.catId;
  if (cid) {
    const cat = catByID(cid);
    active.style.background = cat.color;
    active.style.color = '#fff';
  }
}

function selectCat(id) {
  selectedCat = id;
  document.querySelectorAll('.cat-pick-btn').forEach(b => {
    const cat = catByID(b.dataset.catId);
    const sel = b.dataset.catId === id;
    b.className = 'cat-pick-btn' + (sel ? ' selected' : '');
    b.style.background  = sel ? cat.color : '';
    b.style.borderColor = sel ? cat.color : '';
    b.style.color       = sel ? '#fff' : '';
  });
}

/* ── Stats Render ────────────────────────────────────────── */
function renderStats() {
  const { level, xpInLevel, xpNeeded } = levelFromXP(stats.xp);
  document.getElementById('statLevel').textContent  = level;
  document.getElementById('statXP').textContent     = stats.xp;
  document.getElementById('statStreak').textContent = stats.streak;
  document.getElementById('statDone').textContent   = stats.completed_count;
  document.getElementById('xpBarLabel').textContent = `${xpInLevel} / ${xpNeeded} XP`;
  document.getElementById('xpFill').style.width     = `${Math.round((xpInLevel / xpNeeded) * 100)}%`;
}

function renderBadges() {
  const list = document.getElementById('badgesList');
  list.innerHTML = '';
  BADGES.forEach(b => {
    const el = document.createElement('div');
    const earned = stats.badges.includes(b.id);
    el.className = `badge-pill ${earned ? 'earned' : 'locked'}`;
    el.title = b.label;
    el.innerHTML = `${b.icon} ${b.label}`;
    list.appendChild(el);
  });
}

/* ── Tasks ───────────────────────────────────────────────── */
async function loadTasks() {
  document.getElementById('loadingWrap').style.display = 'block';
  try {
    tasks = await db('/todos?order=created_at.desc&select=*') || [];
  } catch (e) { console.error(e); }
  finally {
    document.getElementById('loadingWrap').style.display = 'none';
    render();
  }
}

async function addTask() {
  const input   = document.getElementById('taskInput');
  const dueInput = document.getElementById('taskDue');
  const text    = input.value.trim();
  if (!text) return;
  const due_at = dueInput.value ? new Date(dueInput.value).toISOString() : null;
  input.value    = '';
  dueInput.value = '';
  try {
    const payload = { text, done: false, category: selectedCat };
    if (due_at) payload.due_at = due_at;
    const [task] = await db('/todos', { method: 'POST', body: JSON.stringify(payload) });
    tasks.unshift(task);
    render();
  } catch (e) { alert('Görev eklenemedi: ' + e.message); }
}

async function toggleTask(task, itemEl) {
  const nowDone = !task.done;
  await db(`/todos?id=eq.${task.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ done: nowDone })
  });
  task.done = nowDone;

  if (nowDone) {
    const xpGain = await onTaskCompleted(task);
    showXpFloat(itemEl, xpGain);
  }
  render();
}

async function deleteTask(id) {
  await db(`/todos?id=eq.${id}`, { method: 'DELETE', headers: { Prefer: '' } });
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function scheduleUpdate(task, text) {
  clearTimeout(editTimers[task.id]);
  editTimers[task.id] = setTimeout(async () => {
    await db(`/todos?id=eq.${task.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ text })
    });
    task.text = text;
  }, 700);
}

/* ── Render ──────────────────────────────────────────────── */
function render() {
  const list  = document.getElementById('taskList');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');

  let visible = tasks;
  if (catFilter !== 'all') visible = visible.filter(t => t.category === catFilter);
  visible = visible.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.done : !t.done
  );

  const remaining = tasks.filter(t => !t.done).length;
  count.textContent = `${remaining} aktif görev`;
  list.innerHTML = '';
  empty.style.display = visible.length === 0 ? 'block' : 'none';

  visible.forEach(task => {
    const cat  = catByID(task.category || 'genel');
    const item = document.createElement('div');
    item.className = 'task-item' + (task.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type    = 'checkbox';
    cb.checked = task.done;
    cb.addEventListener('change', () => toggleTask(task, item));

    const body = document.createElement('div');
    body.className = 'task-body';

    const meta = document.createElement('div');
    meta.className = 'task-meta';

    const tag = document.createElement('span');
    tag.className = 'cat-tag';
    tag.style.background = cat.color;
    tag.innerHTML = `${cat.icon} ${cat.label}`;

    const xpTag = document.createElement('span');
    xpTag.className = 'xp-tag';
    xpTag.textContent = `+${cat.xp} XP`;

    meta.appendChild(tag);
    if (!task.done) meta.appendChild(xpTag);

    if (task.due_at) {
      const due = formatDue(task.due_at);
      const dueEl = document.createElement('span');
      dueEl.className = `due-tag ${due.cls}`;
      dueEl.textContent = due.label;
      meta.appendChild(dueEl);
    }

    const textarea = document.createElement('textarea');
    textarea.className  = 'task-text';
    textarea.value      = task.text;
    textarea.rows       = 1;
    textarea.spellcheck = false;
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
      scheduleUpdate(task, textarea.value);
    });
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); textarea.blur(); }
    });

    body.appendChild(meta);
    body.appendChild(textarea);

    const del = document.createElement('button');
    del.className = 'btn-del';
    del.title     = 'Sil';
    del.innerHTML = '✕';
    del.addEventListener('click', () => deleteTask(task.id));

    const actions = document.createElement('div');
    actions.className = 'task-actions';
    actions.appendChild(del);

    item.appendChild(cb);
    item.appendChild(body);
    item.appendChild(actions);
    list.appendChild(item);

    textarea.style.height = textarea.scrollHeight + 'px';
  });
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── Animations ──────────────────────────────────────────── */
function formatDue(isoStr) {
  if (!isoStr) return null;
  const d     = new Date(isoStr);
  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dDay  = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff  = dDay - today;

  const timeStr = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });

  if (diff < 0)       return { label: `⏰ ${dateStr} ${timeStr}`, cls: 'overdue' };
  if (diff === 0)     return { label: `⏰ Bugün ${timeStr}`,       cls: 'today'   };
  if (diff === 86400000) return { label: `📅 Yarın ${timeStr}`,   cls: 'future'  };
  return               { label: `📅 ${dateStr} ${timeStr}`,       cls: 'future'  };
}

function showXpFloat(el, xp) {
  const f = document.createElement('div');
  f.className = 'xp-float';
  f.textContent = `+${xp} XP`;
  el.appendChild(f);
  setTimeout(() => f.remove(), 1300);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Email confirmation handler ──────────────────────────── */
function handleEmailConfirmation() {
  const hash = window.location.hash.substring(1);
  if (!hash) return false;
  const p = Object.fromEntries(new URLSearchParams(hash));
  if (p.access_token && (p.type === 'signup' || p.type === 'recovery')) {
    const payload = jwtPayload(p.access_token);
    saveSession({
      access_token:  p.access_token,
      refresh_token: p.refresh_token,
      user: { id: payload.sub, email: payload.email || '' }
    });
    history.replaceState(null, '', window.location.pathname);
    return true;
  }
  return false;
}

/* ── Boot ────────────────────────────────────────────────── */
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

(async function init() {
  if (handleEmailConfirmation()) { await initApp(); return; }
  const stored = localStorage.getItem('sb_session');
  if (stored) {
    try { saveSession(JSON.parse(stored)); await initApp(); return; } catch (_) {}
  }
  showAuth();
})();
</script>
