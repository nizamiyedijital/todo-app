<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Segoe UI', system-ui, sans-serif;
      background:#f5f6fa; min-height:100vh;
    }

    /* ── Auth ── */
    #authBox {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px;
    }
    .auth-card {
      background:#fff; border-radius:18px;
      padding:36px 32px; width:100%; max-width:400px;
      box-shadow:0 2px 20px rgba(0,0,0,0.09);
    }
    .auth-card h1 { text-align:center; font-size:1.6rem; color:#1a1a2e; margin-bottom:4px; }
    .auth-subtitle { text-align:center; color:#bbb; font-size:.83rem; margin-bottom:28px; }
    .auth-card h2 { text-align:center; color:#333; margin-bottom:20px; font-size:1.05rem; font-weight:600; }
    .field { margin-bottom:13px; }
    .field label { display:block; font-size:.79rem; color:#666; margin-bottom:5px; font-weight:500; }
    .field input {
      width:100%; padding:11px 14px;
      border:1.5px solid #e0e4ef; border-radius:10px;
      font-size:.95rem; outline:none; transition:border-color .2s;
    }
    .field input:focus { border-color:#4f6ef7; }
    .btn-primary {
      width:100%; padding:12px; background:linear-gradient(135deg,#4f6ef7,#7c3aed);
      color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:600;
      cursor:pointer; margin-top:6px; transition:opacity .2s;
    }
    .btn-primary:hover { opacity:.9; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .auth-switch { text-align:center; margin-top:14px; font-size:.87rem; color:#888; }
    .auth-switch a { color:#4f6ef7; cursor:pointer; font-weight:600; }
    .msg { padding:10px 14px; border-radius:9px; font-size:.87rem; margin-bottom:14px; display:none; }
    .msg.error   { background:#fff0f0; color:#c53030; border:1px solid #fcc; display:block; }
    .msg.success { background:#f0fff4; color:#276749; border:1px solid #9ae6b4; display:block; }

    /* ── App layout ── */
    #appBox { display:none; height:100vh; overflow:hidden; }

    .app-layout {
      display:flex; height:100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width:230px; flex-shrink:0;
      background:#fff;
      border-right:1px solid #e8ecf4;
      display:flex; flex-direction:column;
      overflow:hidden;
    }

    .sidebar-header {
      padding:20px 16px 12px;
      border-bottom:1px solid #f0f2f8;
    }
    .sidebar-title {
      font-size:1.1rem; font-weight:700; color:#1a1a2e;
      display:flex; align-items:center; justify-content:space-between;
    }
    .btn-logout {
      font-size:.72rem; color:#aaa; background:none; border:none;
      cursor:pointer; transition:color .15s;
    }
    .btn-logout:hover { color:#e53e3e; }

    /* Stats in sidebar */
    .sidebar-stats {
      padding:12px 16px;
      border-bottom:1px solid #f0f2f8;
      display:flex; flex-direction:column; gap:5px;
    }
    .stat-row {
      display:flex; justify-content:space-between; align-items:center;
    }
    .stat-lbl { font-size:.74rem; color:#aaa; font-weight:500; }
    .stat-val { font-size:.85rem; font-weight:700; }
    .stat-val.blue   { color:#4f6ef7; }
    .stat-val.green  { color:#22c55e; }
    .stat-val.orange { color:#f97316; }

    /* List items */
    .sidebar-lists {
      flex:1; overflow-y:auto; padding:8px 8px;
    }
    .sidebar-lists::-webkit-scrollbar { width:4px; }
    .sidebar-lists::-webkit-scrollbar-thumb { background:#e0e4ef; border-radius:4px; }

    .list-item {
      display:flex; align-items:center; gap:9px;
      padding:9px 10px; border-radius:9px;
      cursor:pointer; transition:background .12s;
      position:relative; group: list;
    }
    .list-item:hover { background:#f4f5f9; }
    .list-item.active { background:#eef1fd; }
    .list-item.active .list-name { color:#4f6ef7; font-weight:600; }
    .list-item.active .list-count { background:#dce4fd; color:#4f6ef7; }

    .list-icon { font-size:.95rem; flex-shrink:0; }
    .list-name {
      flex:1; font-size:.87rem; color:#333; font-weight:500;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      cursor:pointer; border:none; outline:none; background:transparent;
      font-family:inherit;
    }
    .list-name:focus { color:#4f6ef7; }
    .list-count {
      font-size:.7rem; font-weight:600; color:#999;
      background:#f0f2f8; border-radius:9px; padding:1px 7px;
      flex-shrink:0;
    }

    .btn-list-more {
      width:22px; height:22px; border:none; background:transparent;
      cursor:pointer; color:#bbb; font-size:1rem; border-radius:5px;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:all .15s; flex-shrink:0; line-height:1;
    }
    .list-item:hover .btn-list-more { opacity:1; }
    .btn-list-more:hover { background:#e8ecf4; color:#555; opacity:1; }

    /* List context menu */
    .list-ctx-wrap { position:relative; flex-shrink:0; }
    .list-ctx-menu {
      display:none; position:fixed; background:#fff;
      border-radius:10px; border:1.5px solid #e8ecf4;
      box-shadow:0 4px 16px rgba(0,0,0,0.1); z-index:250;
      min-width:160px; overflow:hidden;
    }
    .list-ctx-menu.open { display:block; }
    .list-ctx-item {
      display:flex; align-items:center; gap:9px;
      padding:9px 14px; font-size:.84rem; color:#333;
      cursor:pointer; border:none; background:transparent;
      width:100%; text-align:left; transition:background .1s;
    }
    .list-ctx-item:hover { background:#f4f5ff; color:#4f6ef7; }
    .list-ctx-item.danger:hover { background:#fff0f0; color:#e53e3e; }
    .list-ctx-sep { height:1px; background:#f0f2f8; margin:3px 0; }

    /* Add list */
    .sidebar-footer {
      padding:10px 8px 16px;
      border-top:1px solid #f0f2f8;
    }
    .btn-new-list {
      display:flex; align-items:center; gap:7px;
      width:100%; padding:9px 10px; border:none; background:transparent;
      border-radius:9px; cursor:pointer; font-size:.85rem; color:#888;
      font-family:inherit; transition:background .12s;
    }
    .btn-new-list:hover { background:#f4f5f9; color:#4f6ef7; }
    .btn-new-list-icon { font-size:1rem; line-height:1; }

    .new-list-input-row {
      display:none; padding:4px 4px; gap:5px;
    }
    .new-list-input-row.open { display:flex; }
    .new-list-input-row input {
      flex:1; padding:8px 10px; border:1.5px solid #e0e4ef; border-radius:8px;
      font-size:.84rem; font-family:inherit; outline:none; transition:border-color .2s;
    }
    .new-list-input-row input:focus { border-color:#4f6ef7; }
    .btn-nl-ok {
      padding:8px 12px; border:none; border-radius:8px;
      background:#4f6ef7; color:#fff; font-size:.8rem; font-weight:600;
      cursor:pointer; white-space:nowrap;
    }
    .btn-nl-cxl {
      padding:8px 10px; border:1.5px solid #e8ecf4; border-radius:8px;
      background:#fff; color:#aaa; font-size:.8rem; cursor:pointer;
    }

    /* ── Main area ── */
    .main-area {
      flex:1; display:flex; flex-direction:column;
      overflow:hidden; min-width:0;
    }

    .main-header {
      padding:14px 28px 12px;
      display:flex; align-items:center; gap:12px;
      border-bottom:1px solid #e8ecf4;
      flex-shrink:0;
    }
    .main-list-icon { font-size:1.4rem; }
    .main-list-title { font-size:1.3rem; font-weight:700; color:#1a1a2e; }

    .main-body {
      flex:1; overflow-y:auto; padding:12px 28px 40px;
    }
    .main-body::-webkit-scrollbar { width:5px; }
    .main-body::-webkit-scrollbar-thumb { background:#e0e4ef; border-radius:4px; }

    /* ── Add task ── */
    .add-wrap {
      background:#fff; border-radius:13px;
      margin-bottom:14px;
      box-shadow:0 1px 4px rgba(0,0,0,0.05);
      overflow:hidden;
    }
    .add-main-row {
      display:flex; align-items:center;
      padding:4px 10px 4px 16px; gap:8px;
    }
    .add-plus { font-size:1.1rem; color:#4f6ef7; flex-shrink:0; }
    .add-main-row input {
      flex:1; padding:13px 0; border:none; font-size:.93rem;
      outline:none; background:transparent; color:#333;
    }
    .add-main-row input::placeholder { color:#ccc; }
    .btn-add {
      padding:7px 15px; background:#4f6ef7; color:#fff;
      border:none; border-radius:9px; font-size:.85rem; font-weight:600;
      cursor:pointer; transition:background .15s; white-space:nowrap;
    }
    .btn-add:hover { background:#3a58e2; }
    .add-detail {
      display:none; flex-direction:column; gap:8px;
      padding:0 16px 13px;
    }
    .add-detail.open { display:flex; padding-top:10px; border-top:1px solid #f4f5f9; }
    .add-detail textarea {
      width:100%; border:1.5px solid #e8ecf4; border-radius:9px;
      padding:8px 12px; font-size:.87rem; font-family:inherit;
      outline:none; resize:none; color:#444; line-height:1.5;
      transition:border-color .2s;
    }
    .add-detail textarea:focus { border-color:#4f6ef7; }
    .add-bottom-row {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }
    .btn-cal {
      width:30px; height:30px; border:1.5px solid #e0e4ef; border-radius:8px;
      background:#fff; cursor:pointer; font-size:.9rem; flex-shrink:0;
      display:inline-flex; align-items:center; justify-content:center;
      transition:border-color .18s, background .18s;
    }
    .btn-cal:hover, .btn-cal.has-date { border-color:#4f6ef7; background:#f0f3ff; }
    .due-selected-label {
      font-size:.77rem; color:#4f6ef7; font-weight:500;
      white-space:nowrap; cursor:pointer;
    }
    .btn-add-cancel {
      margin-left:auto; padding:5px 12px; font-size:.79rem;
      border:1.5px solid #e8ecf4; border-radius:8px; background:#fff;
      cursor:pointer; color:#aaa;
    }

    /* ── Summary ── */
    .summary-row {
      display:flex; justify-content:flex-end; align-items:center;
      margin-bottom:10px;
    }
    .btn-toggle-done {
      padding:5px 12px; background:transparent;
      border:1.5px solid #e8ecf4; border-radius:20px;
      font-size:.77rem; cursor:pointer; color:#888; transition:all .18s;
    }
    .btn-toggle-done:hover { background:#f4f5f9; }

    /* ── Task card ── */
    .task-card {
      background:#fff; border-radius:10px;
      margin-bottom:2px; position:relative; overflow:hidden;
      transition:box-shadow .15s;
      border-left:3px solid transparent;
    }
    .task-card:hover { box-shadow:0 2px 6px rgba(0,0,0,0.06); }
    .task-card.prio-p1 { border-left-color:#dc2626; }
    .task-card.prio-p2 { border-left-color:#ca8a04; }
    .task-card.prio-p3 { border-left-color:#ea580c; }
    .task-card.prio-p4 { border-left-color:#94a3b8; }
    .task-row {
      display:flex; align-items:flex-start; gap:9px;
      padding:7px 10px 7px 11px;
    }
    .task-check {
      width:17px; height:17px; flex-shrink:0; margin-top:2px;
      border:2px solid #d0d5e8; border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all .18s; background:transparent;
    }
    .task-check:hover { border-color:#4f6ef7; }
    .task-check.checked { background:#4f6ef7; border-color:#4f6ef7; }
    .task-check.checked::after { content:'✓'; color:#fff; font-size:.6rem; font-weight:700; }
    .task-body { flex:1; min-width:0; }
    .task-title {
      font-size:.83rem; color:#1a1a2e; border:none; outline:none;
      background:transparent; font-family:inherit; width:100%; padding:0;
      line-height:1.3; display:block;
    }
    .task-done .task-title { text-decoration:line-through; color:#bbb; }
    .task-meta {
      display:flex; align-items:center; gap:4px; margin-top:3px; flex-wrap:wrap;
    }
    .due-tag {
      font-size:.63rem; font-weight:500; padding:1px 5px; border-radius:5px;
      display:inline-flex; align-items:center; white-space:nowrap;
    }
    .due-tag.future  { background:#eff6ff; color:#3b82f6; }
    .due-tag.today   { background:#fff7ed; color:#c2410c; }
    .due-tag.overdue { background:#fef2f2; color:#dc2626; }
    .subtask-badge {
      font-size:.63rem; color:#aaa;
      background:#f4f5f9; border-radius:5px; padding:1px 5px;
    }
    /* Star button on card */
    .btn-star {
      width:26px; height:26px; border:none; background:transparent;
      cursor:pointer; font-size:.95rem; border-radius:6px;
      display:flex; align-items:center; justify-content:center;
      color:#ddd; transition:all .15s; flex-shrink:0;
      opacity:0;
    }
    .task-card:hover .btn-star { opacity:1; }
    .btn-star:hover { color:#f59e0b; }
    .btn-star.starred {
      color:#f59e0b; opacity:1;
      font-size:1.05rem;
      text-shadow:0 0 6px rgba(245,158,11,.45);
    }

    /* List label badge (shown in Yıldızlı view) */
    .list-label-badge {
      font-size:.62rem; font-weight:500; color:#888;
      background:#f0f2f8; border-radius:5px; padding:1px 6px;
      white-space:nowrap;
    }

    /* Starred smart list separator */
    .sidebar-sep {
      height:1px; background:#f0f2f8; margin:6px 8px;
    }

    /* Priority dot on card — shown in .task-meta */
    .prio-dot {
      width:7px; height:7px; border-radius:50%; flex-shrink:0; display:inline-block;
    }
    .prio-dot.p1 { background:#dc2626; }
    .prio-dot.p2 { background:#ca8a04; }
    .prio-dot.p3 { background:#ea580c; }
    .prio-dot.p4 { background:#94a3b8; }

    /* Priority picker in detail */
    /* Detail meta row: due + priority side by side */
    .detail-meta-row {
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .priority-row {
      display:flex; align-items:center; gap:5px; flex-shrink:0;
    }
    .priority-row-label { font-size:.76rem; color:#bbb; font-weight:500; flex-shrink:0; }

    /* Priority tooltip */
    .priority-btn { position:relative; }
    .priority-btn[data-label]::after {
      content:attr(data-label);
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:#1a1a2e; color:#fff; font-size:.68rem; font-weight:500;
      white-space:nowrap; padding:3px 8px; border-radius:6px;
      pointer-events:none; opacity:0; transition:opacity .15s; z-index:100;
    }
    @media (hover: hover) {
      .priority-btn[data-label]:hover::after { opacity:1; }
    }
    .priority-btn.show-label::after { opacity:1; }
    .priority-btn {
      width:28px; height:28px; border-radius:50%;
      cursor:pointer; border:2px solid transparent; transition:all .15s;
      background:transparent; display:inline-flex; align-items:center;
      justify-content:center; font-size:1.1rem; padding:0;
    }
    .priority-btn:hover { transform:scale(1.2); }
    .priority-btn.active { transform:scale(1.1); }
    .priority-btn.p1.active { box-shadow:0 0 0 3px #fca5a5; }
    .priority-btn.p2.active { box-shadow:0 0 0 3px #fde047; }
    .priority-btn.p3.active { box-shadow:0 0 0 3px #fdba74; }
    .priority-btn.p4.active { box-shadow:0 0 0 3px #e2e8f0; }
    .task-side {
      display:flex; align-items:center; gap:2px; flex-shrink:0; padding-top:1px;
    }
    .btn-icon {
      width:28px; height:28px; border:none; background:transparent;
      cursor:pointer; border-radius:7px; display:flex; align-items:center;
      justify-content:center; font-size:1rem; color:#bbb;
      transition:all .15s; opacity:0;
    }
    .task-card:hover .btn-icon { opacity:1; color:#888; }
    .btn-icon:hover { background:#eef1fd; color:#4f6ef7; }
    .btn-icon.del:hover { background:#fff0f0; color:#e53e3e; }

    /* ── Task detail ── */
    .task-detail {
      display:flex; flex-direction:column; gap:9px;
      padding:0 12px 0 37px;
      max-height:0; overflow:hidden;
      border-top:1px solid transparent;
      transition:max-height .28s ease, padding .26s ease, border-color .2s;
    }
    .task-detail.open {
      max-height:600px;
      padding:10px 12px 12px 37px;
      border-top-color:#f5f6fa;
    }

    /* ── Task animations ── */
    @keyframes taskSlideIn {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .task-card.new { animation:taskSlideIn .22s ease forwards; }

    @keyframes checkBounce {
      0%   { transform:scale(1); }
      40%  { transform:scale(1.45); }
      70%  { transform:scale(.88); }
      100% { transform:scale(1); }
    }
    .task-check.bounce { animation:checkBounce .28s ease; }

    @keyframes taskComplete {
      0%   { opacity:1; transform:translateX(0); }
      35%  { opacity:1; transform:translateX(10px); }
      100% { opacity:0; transform:translateX(-14px); }
    }
    .task-card.completing {
      animation:taskComplete .38s cubic-bezier(.4,0,.6,1) forwards;
      pointer-events:none;
    }
    .detail-notes {
      width:100%; border:1.5px solid #e8ecf4; border-radius:9px;
      padding:8px 12px; font-size:.87rem; font-family:inherit;
      outline:none; resize:none; color:#555; line-height:1.5;
      transition:border-color .2s; min-height:48px;
    }
    .detail-notes::placeholder { color:#ccc; }
    .detail-notes:focus { border-color:#4f6ef7; }
    .detail-due-row {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }
    .detail-due-label { font-size:.76rem; color:#bbb; font-weight:500; }
    .btn-clear-due {
      font-size:.72rem; color:#ccc; cursor:pointer;
      border:none; background:none; transition:color .15s;
    }
    .btn-clear-due:hover { color:#e53e3e; }

    /* Subtasks */
    .subtasks-list { display:flex; flex-direction:column; gap:3px; }
    .subtask-row {
      display:flex; align-items:center; gap:8px;
      padding:5px 10px; border-radius:8px; background:#f8f9fc;
    }
    .sub-check {
      width:15px; height:15px; border:2px solid #d0d5e8; border-radius:50%;
      flex-shrink:0; cursor:pointer; display:flex; align-items:center;
      justify-content:center; transition:all .15s;
    }
    .sub-check:hover { border-color:#4f6ef7; }
    .sub-check.checked { background:#4f6ef7; border-color:#4f6ef7; }
    .sub-check.checked::after { content:'✓'; color:#fff; font-size:.55rem; font-weight:700; }
    .sub-text {
      flex:1; font-size:.87rem; color:#333; border:none; outline:none;
      background:transparent; font-family:inherit; padding:0;
    }
    .sub-text.done-text { text-decoration:line-through; color:#bbb; }
    .btn-del-sub {
      width:20px; height:20px; border:none; background:transparent;
      cursor:pointer; color:#ccc; font-size:.72rem; border-radius:5px;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:all .15s;
    }
    .subtask-row:hover .btn-del-sub { opacity:1; }
    .btn-del-sub:hover { background:#fff0f0; color:#e53e3e; }
    .btn-add-subtask {
      font-size:.81rem; color:#4f6ef7; background:none; border:none;
      cursor:pointer; display:flex; align-items:center; gap:4px;
      font-weight:500; padding:3px 0; transition:opacity .15s;
    }
    .btn-add-subtask:hover { opacity:.7; }
    .subtask-input-row { display:none; align-items:center; gap:6px; }
    .subtask-input-row.open { display:flex; }
    .subtask-input-row input {
      flex:1; padding:7px 10px; border:1.5px solid #e8ecf4; border-radius:8px;
      font-size:.87rem; font-family:inherit; outline:none;
    }
    .subtask-input-row input:focus { border-color:#4f6ef7; }
    .subtask-input-row button {
      padding:7px 12px; border:none; border-radius:8px;
      font-size:.82rem; font-weight:600; cursor:pointer;
    }
    .sub-ok  { background:#4f6ef7; color:#fff; }
    .sub-cxl { background:transparent; color:#aaa; border:1.5px solid #e8ecf4 !important; }

    /* Completed */
    .done-section { margin-top:10px; }
    .done-toggle {
      display:flex; align-items:center; gap:8px;
      padding:9px 11px; background:transparent; border:none;
      cursor:pointer; color:#999; font-size:.83rem; font-weight:500;
      width:100%; text-align:left; border-radius:10px; transition:background .15s;
    }
    .done-toggle:hover { background:#eef0f9; }
    .done-chevron { font-size:.67rem; transition:transform .2s; }
    .done-toggle.open .done-chevron { transform:rotate(90deg); }
    .done-badge {
      background:#e8ecf4; border-radius:10px; padding:1px 7px; font-size:.72rem;
    }
    .done-list { display:none; flex-direction:column; gap:2px; margin-top:4px; }
    .done-list.open { display:flex; }

    .empty { text-align:center; color:#ccc; padding:40px 0; font-size:.9rem; }
    .loading-wrap { text-align:center; color:#ccc; padding:28px 0; }

    /* ── Date-Time Picker ── */
    .dtp-overlay { position:fixed; inset:0; z-index:200; display:none; }
    .dtp-overlay.open { display:block; }
    .dtp-box {
      position:fixed; background:#fff; border-radius:12px;

  const s = listSorts[listId];
  if (!s) return activeTasks;
  const { by, dir } = s;
  const mul = dir==='asc' ? 1 : -1;
  return [...activeTasks].sort((a, b) => {
    let av, bv;
    if (by==='priority') {
      av = PRIO_ORDER[a.priority] ?? 99;
      bv = PRIO_ORDER[b.priority] ?? 99;
    } else if (by==='due_at') {
      av = a.due_at ? new Date(a.due_at).getTime() : (dir==='asc' ? Infinity : -Infinity);
      bv = b.due_at ? new Date(b.due_at).getTime() : (dir==='asc' ? Infinity : -Infinity);
    } else {
      av = new Date(a.created_at).getTime();
      bv = new Date(b.created_at).getTime();
    }
    return (av - bv) * mul;
  });
}

/* ── Session ── */
function jwtPayload(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch { return {}; } }
function isTokenExpired(t) { const p = jwtPayload(t); return !p.exp || Date.now()/1000 > p.exp; }
function saveSession(s) {
  if (s.access_token && !s.user?.id) {
    const p = jwtPayload(s.access_token);
    s.user = { ...(s.user||{}), id:p.sub, email:s.user?.email||p.email||'' };
  }
  session = s;
  localStorage.setItem('sb_session', JSON.stringify(s));
}
function clearSession() { session=null; localStorage.removeItem('sb_session'); }
function authHdr(x={}) {
  return { apikey:ANON, Authorization:`Bearer ${session.access_token}`,
           'Content-Type':'application/json', Prefer:'return=representation', ...x };
}

/* ── API ── */
async function authPost(path, body) {
  const r = await fetch(`${SB}/auth/v1${path}`, {
    method:'POST', headers:{apikey:ANON,'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error_description||d.msg||d.error||'Hata');
  return d;
}
async function db(path, opts={}) {
  const r = await fetch(`${SB}/rest/v1${path}`, { ...opts, headers:{...authHdr(),...opts.headers} });
  if (r.status === 401) { clearSession(); showAuth(); throw new Error('Oturum süresi doldu'); }
  if (!r.ok) { const e=await r.json().catch(()=>({})); throw new Error(e.message||`HTTP ${r.status}`); }
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

/* ── Rename ── */
function startRename(listId) {
  const item = document.querySelector(`.list-item[data-id="${listId}"]`);
  if (!item) return;
  const nameEl = item.querySelector('.list-name');
  const list   = lists.find(l=>l.id===listId);

  const input = document.createElement('input');
  input.className = 'list-rename-input';
  input.value     = list.name;
  item.replaceChild(input, nameEl);
  input.focus(); input.select();

  const finish = () => {
    const newName = input.value.trim();
    item.replaceChild(nameEl, input);
    if (newName && newName !== list.name) updateList(listId, {name:newName});
  };
  input.onblur   = finish;
  input.onkeydown = (e) => {
    if (e.key==='Enter')  { e.preventDefault(); input.blur(); }
    if (e.key==='Escape') { input.value=list.name; input.blur(); }
    e.stopPropagation();
  };
}

async function addTask() {
  const input   = document.getElementById('taskInput');
  const notesEl = document.getElementById('addNotes');
  const text    = input.value.trim();
  if (!text || !activeListId) { input.focus(); return; }
  const payload = { text, done:false, category:activeListId, sort_order:Date.now() };
  if (notesEl.value.trim()) payload.notes  = notesEl.value.trim();
  if (addDueValue)          payload.due_at = addDueValue;
  input.value=''; notesEl.value='';
  addDueValue=''; renderAddDueLabel();
  closeAddDetail();
  try {
    const [t] = await db('/todos',{method:'POST',body:JSON.stringify(payload)});
    tasks.unshift(t); recentlyAddedId = t.id; render(); renderSidebar();
  } catch(e) { alert(e.message); }
}

async function addSubtask(parentId, text) {
  if (!text.trim()) return;
  const parent  = tasks.find(t=>t.id===parentId);
  const payload = { text:text.trim(), done:false, category:parent?.category||activeListId, parent_id:parentId, sort_order:Date.now() };
  try { const [t]=await db('/todos',{method:'POST',body:JSON.stringify(payload)}); tasks.push(t); render(); }
  catch(e) { alert(e.message); }
}

async function toggleTask(task) {
  const nowDone = !task.done;
  if (nowDone) {
    const card = document.querySelector(`[data-task-id="${task.id}"]`);
    if (card) {
      const chk = card.querySelector('.task-check');
      if (chk) { chk.classList.add('bounce'); }
      if (navigator.vibrate) navigator.vibrate([12, 0, 8]);
      await new Promise(r => setTimeout(r, 200));
      card.classList.add('completing');
      await new Promise(r => setTimeout(r, 380));
    }
  }
  const patch = { done:nowDone };
  if (nowDone) { patch.completed_at = new Date().toISOString(); openDetailIds.delete(task.id); }
  else           patch.completed_at = null;
  await db(`/todos?id=eq.${task.id}`,{method:'PATCH',body:JSON.stringify(patch)});
  Object.assign(task, patch);
  render(); renderSidebar();
}

async function deleteTask(id) {
  await db(`/todos?id=eq.${id}`,{method:'DELETE',headers:{Prefer:''}});
  tasks = tasks.filter(t=>t.id!==id && t.parent_id!==id);
  render(); renderSidebar();
}

function scheduleUpdate(task, patch) {
  clearTimeout(editTimers[task.id]);
  editTimers[task.id] = setTimeout(async ()=>{
    await db(`/todos?id=eq.${task.id}`,{method:'PATCH',body:JSON.stringify(patch)});
    Object.assign(task, patch);
  }, 700);
}

async function updateDue(task, val) {
  const due_at = val ? new Date(val).toISOString() : null;
  await db(`/todos?id=eq.${task.id}`,{method:'PATCH',body:JSON.stringify({due_at})});
  task.due_at = due_at; render();
}

  const todayDone  = roots.filter(t=>t.done && t.completed_at && new Date(t.completed_at)>=todayStart).length;

  openDetailIds.forEach(tid => {
    const card = document.querySelector(`[data-task-id="${tid}"]`);
    if (card) card.querySelector('.task-detail')?.classList.add('open');
  });
  if (pendingSubtaskFocus) {
    const tid = pendingSubtaskFocus; pendingSubtaskFocus = null;
    const card = document.querySelector(`[data-task-id="${tid}"]`);
    if (card) {
      card.querySelector('.task-detail')?.classList.add('open');
      card.querySelector('.subtask-input-row')?.classList.add('open');
      card.querySelector('.subtask-input-row input')?.focus();
    }
  }
}

function render() {
  try { renderStats(); } catch(e) { console.error('renderStats:', e); }
  if (!activeListId) return;
  if (activeListId === BOARD_LIST_ID) { renderBoard(); return; }

  const isStarred = activeListId === STARRED_LIST_ID;
  const roots  = isStarred
    ? tasks.filter(t=>!t.parent_id && t.starred)
    : tasks.filter(t=>!t.parent_id && t.category===activeListId);
  const active = isStarred
    ? roots.filter(t=>!t.done)
    : sortedActiveTasks(activeListId, roots.filter(t=>!t.done));
  const done   = roots.filter(t=> t.done);

  const taskList = document.getElementById('taskList');
  taskList.innerHTML = '';
  active.forEach(t=>taskList.appendChild(buildTaskCard(t, false)));

  document.getElementById('empty').style.display = active.length===0 ? 'block' : 'none';

  const doneSection = document.getElementById('doneSection');
  doneSection.style.display = done.length > 0 ? 'block' : 'none';
  document.getElementById('doneBadge').textContent = done.length;
  const doneList = document.getElementById('doneList');
  doneList.innerHTML='';
  doneList.classList.toggle('open', doneOpen);
  if (doneOpen) done.forEach(t=>doneList.appendChild(buildTaskCard(t,true)));

  restoreOpenDetails();
}

/* ── Build task card ── */
function buildTaskCard(task, isDone) {
  const subs     = tasks.filter(t=>t.parent_id===task.id);
  const subsDone = subs.filter(t=>t.done).length;
  const due      = formatDue(task.due_at);

  const card = document.createElement('div');
  card.className = 'task-card'+(isDone?' task-done':'')+(task.priority?' prio-'+task.priority:'');
  card.dataset.taskId = task.id;
  if (task.id === recentlyAddedId) { card.classList.add('new'); recentlyAddedId = null; }

  const row = document.createElement('div');
  row.className = 'task-row';

  const chk = document.createElement('div');
  chk.className = `task-check${task.done?' checked':''}`;
  chk.title     = task.done ? 'Tamamlandıyı geri al' : 'Tamamlandı yap';
  chk.onclick   = () => toggleTask(task);

  const body = document.createElement('div');
  body.className = 'task-body';

  const titleInput = document.createElement('input');
  titleInput.className = 'task-title';
  titleInput.type      = 'text';
  titleInput.value     = task.text;
  if (isDone) titleInput.disabled = true;
  titleInput.addEventListener('change', ()=>scheduleUpdate(task,{text:titleInput.value}));
  titleInput.addEventListener('keydown', e=>{
    if (e.key==='Enter'&&e.shiftKey&&!isDone) {
      e.preventDefault();
      detail.classList.add('open');
      subInputRow.classList.add('open');
      subInput.focus();
    }
  });

  const meta = document.createElement('div');
  meta.className = 'task-meta';
  if (due) {
    const d = document.createElement('span');
    d.className=`due-tag ${due.cls}`; d.textContent=due.label;
    meta.appendChild(d);
  }
  if (subs.length>0) {
    const sb = document.createElement('span');
    sb.className='subtask-badge'; sb.textContent=`${subsDone}/${subs.length}`;
    meta.appendChild(sb);
  }
  if (task.priority && PRIORITIES[task.priority]) {
    const dot = document.createElement('span');
    dot.className=`prio-dot ${task.priority}`;
    dot.title=`${PRIORITIES[task.priority].icon} ${PRIORITIES[task.priority].label}`;
    meta.appendChild(dot);
  }
  if (activeListId === STARRED_LIST_ID) {
    const listObj = lists.find(l=>l.id===task.category);
    if (listObj) {
      const lbl = document.createElement('span');
      lbl.className = 'list-label-badge';
      lbl.textContent = `${listObj.icon} ${listObj.name}`;
      meta.appendChild(lbl);
    }
  }
  body.appendChild(titleInput);
  if (meta.children.length) body.appendChild(meta);

  const side = document.createElement('div');
  side.className = 'task-side';

  const starBtn = document.createElement('button');
  starBtn.className = 'btn-star' + (task.starred?' starred':'');
  starBtn.title     = task.starred ? 'Yıldızı kaldır' : 'Yıldızla';
  starBtn.textContent = task.starred ? '★' : '☆';
  starBtn.onclick   = (e) => { e.stopPropagation(); toggleStar(task); };

  const expandBtn = document.createElement('button');
  expandBtn.className='btn-icon'; expandBtn.title='Seçenekler'; expandBtn.textContent='⋯';
  expandBtn.onclick = (e) => { e.stopPropagation(); openTaskCtxMenu(expandBtn, task); };

  side.appendChild(starBtn);
  side.appendChild(expandBtn);

  row.appendChild(chk);
  row.appendChild(body);
  row.appendChild(side);

  /* Detail */
  const detail = document.createElement('div');
  detail.className = 'task-detail';

  const notesTA = document.createElement('textarea');
  notesTA.className='detail-notes'; notesTA.placeholder='Notlar';
  notesTA.value=task.notes||''; notesTA.rows=2;
  notesTA.addEventListener('input',()=>{ notesTA.style.height='auto'; notesTA.style.height=notesTA.scrollHeight+'px'; });
  notesTA.addEventListener('change',()=>scheduleUpdate(task,{notes:notesTA.value}));

  const dueRow = document.createElement('div');
  dueRow.className='detail-due-row';
  const dueCalBtn = document.createElement('button');
  dueCalBtn.className='btn-cal'+(task.due_at?' has-date':'');
  dueCalBtn.title='Bitiş tarihi seç'; dueCalBtn.textContent='📅';
  dueCalBtn.onclick=()=>dtpOpen(dueCalBtn,task.due_at,async v=>{
    await updateDue(task,v);
    dueCalBtn.classList.toggle('has-date',!!v);
    dueDateLabel.textContent=v?fmtShort(v):'';
  });
  const dueDateLabel = document.createElement('span');
  dueDateLabel.className='due-selected-label';
  dueDateLabel.textContent=task.due_at?fmtShort(task.due_at):'';
  dueDateLabel.onclick=()=>dueCalBtn.click();
  const clearDueBtn = document.createElement('button');
  clearDueBtn.className='btn-clear-due'; clearDueBtn.title='Tarihi kaldır'; clearDueBtn.textContent='✕ Temizle';
  clearDueBtn.onclick=()=>{ updateDue(task,''); dueCalBtn.classList.remove('has-date'); dueDateLabel.textContent=''; };
  dueRow.appendChild(dueCalBtn); dueRow.appendChild(dueDateLabel);
  if (task.due_at) dueRow.appendChild(clearDueBtn);

  const subList = document.createElement('div');
  subList.className='subtasks-list';
  subs.forEach(s=>buildSubRow(s,subList));

  const subInputRow = document.createElement('div');
  subInputRow.className='subtask-input-row';
  const subInput = document.createElement('input');
  subInput.type='text'; subInput.placeholder='Alt görev ekle...';
  const subOk  = document.createElement('button');
  subOk.className='sub-ok'; subOk.title='Alt görevi ekle'; subOk.textContent='Ekle';
  const subCxl = document.createElement('button');
  subCxl.className='sub-cxl'; subCxl.title='İptal'; subCxl.textContent='İptal';
  subOk.onclick =async()=>{ if(!subInput.value.trim())return; await addSubtask(task.id,subInput.value); subInput.value=''; subInputRow.classList.remove('open'); };
  subCxl.onclick=()=>{ subInput.value=''; subInputRow.classList.remove('open'); };
  subInput.addEventListener('keydown', e=>{
    if (e.key==='Enter' && e.shiftKey) {
      e.preventDefault();
      if (!subInput.value.trim()) { subCxl.click(); return; }
      pendingSubtaskFocus = task.id;
      addSubtask(task.id, subInput.value);
    } else if (e.key==='Enter') {
      if (!subInput.value.trim()) { subCxl.click(); return; }
      subOk.click();
    } else if (e.key==='Escape') {
      subCxl.click();
    }
  });
  subInputRow.appendChild(subInput); subInputRow.appendChild(subOk); subInputRow.appendChild(subCxl);

  const addSubBtn = document.createElement('button');
  addSubBtn.className='btn-add-subtask'; addSubBtn.title='Alt görev ekle'; addSubBtn.textContent='+ Alt görev ekle';
  addSubBtn.onclick=()=>{ subInputRow.classList.add('open'); subInput.focus(); };

  /* Priority picker */
  const prioRow = document.createElement('div');
  prioRow.className = 'priority-row';
  const prioLbl = document.createElement('span');
  prioLbl.className='priority-row-label'; prioLbl.textContent='Öncelik:';
  prioRow.appendChild(prioLbl);
  Object.entries(PRIORITIES).forEach(([key, prio]) => {
    const btn = document.createElement('button');
    btn.className        = `priority-btn ${key}` + (task.priority===key?' active':'');
    btn.textContent      = prio.icon;
    btn.title            = prio.label;
    btn.dataset.label    = prio.label;
    btn.onclick = () => {
      const newVal = task.priority===key ? null : key;
      updatePriority(task, newVal);
    };
    btn.addEventListener('touchstart', () => {
      btn.classList.add('show-label');
      setTimeout(() => btn.classList.remove('show-label'), 1500);
    }, { passive:true });
    prioRow.appendChild(btn);
  });

  const metaRow = document.createElement('div');
  metaRow.className = 'detail-meta-row';
  metaRow.appendChild(dueRow);
  metaRow.appendChild(prioRow);

  detail.appendChild(notesTA);
  detail.appendChild(metaRow);
  if (!isDone) { detail.appendChild(subList); detail.appendChild(subInputRow); detail.appendChild(addSubBtn); }

  row.addEventListener('click', e => {
    if (e.target.closest('.task-side') || e.target.closest('.task-check')) return;
    const wasOpen = detail.classList.contains('open');
    closeAllDetails();
    if (!wasOpen) {
      detail.classList.add('open');
      openDetailIds.add(task.id);
      notesTA.style.height='auto'; notesTA.style.height=notesTA.scrollHeight+'px';
    }
  });

  card.appendChild(row);
  card.appendChild(detail);
  return card;
}

function buildSubRow(sub,container) {
  const row=document.createElement('div'); row.className='subtask-row';
  const chk=document.createElement('div');
  chk.className=`sub-check${sub.done?' checked':''}`;
  chk.title=sub.done ? 'Tamamlandıyı geri al' : 'Tamamlandı yap';
  chk.onclick=()=>toggleTask(sub);
  const txt=document.createElement('input');
  txt.type='text'; txt.className=`sub-text${sub.done?' done-text':''}`;
  txt.value=sub.text; if(sub.done)txt.disabled=true;
  txt.addEventListener('change',()=>scheduleUpdate(sub,{text:txt.value}));
  const del=document.createElement('button');
  del.className='btn-del-sub'; del.title='Alt görevi sil'; del.textContent='✕'; del.onclick=()=>deleteTask(sub.id);
  row.appendChild(chk); row.appendChild(txt); row.appendChild(del);
  container.appendChild(row);
}

/* ── Helpers ── */
function fmtShort(iso) {
  if (!iso) return '';
  const d=new Date(iso);
  return d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})+' '+
         d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
}
function formatDue(iso) {
  if (!iso) return null;
  const d=new Date(iso);
  const today=new Date(); today.setHours(0,0,0,0);
  const dDay=new Date(d); dDay.setHours(0,0,0,0);
  const diff=dDay-today;
  const time=d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  const date=d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
  if(diff<0)          return{label:`${date} ${time}`, cls:'overdue'};
  if(diff===0)        return{label:`Bugün ${time}`,   cls:'today'  };
  if(diff===86400000) return{label:`Yarın ${time}`,   cls:'future' };
  return                   {label:`${date} ${time}`,  cls:'future' };
}

/* ── Date-Time Picker ── */
const MINS=[0,5,10,15,20,25,30,35,40,45,50,55];
const TR_MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
let dtp={year:0,month:0,day:0,cb:null};
function dtpOpen(anchor,currentISO,cb) {
  dtp.cb=cb;
  const now=currentISO?new Date(currentISO):new Date();
  dtp.year=now.getFullYear(); dtp.month=now.getMonth();
  dtp.day=currentISO?now.getDate():0;
  const hSel=document.getElementById('dtpHourSel'); hSel.innerHTML='';
  for(let h=0;h<24;h++){const o=document.createElement('option');o.value=h;o.textContent=String(h).padStart(2,'0');hSel.appendChild(o);}
  hSel.value=currentISO?now.getHours():9;
  const mSel=document.getElementById('dtpMinSel'); mSel.innerHTML='';
  MINS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=String(m).padStart(2,'0');mSel.appendChild(o);});
  mSel.value=currentISO?MINS.reduce((a,b)=>Math.abs(b-now.getMinutes())<Math.abs(a-now.getMinutes())?b:a):0;
  dtpRenderCal();
  const box=document.getElementById('dtpBox');
  box.classList.add('open');
  document.getElementById('dtpOverlay').classList.add('open');
  const rect=anchor.getBoundingClientRect();
  const vw=window.innerWidth,vh=window.innerHeight,bw=250,bh=340;
  let left=rect.left, top=rect.bottom+6;
  if(left+bw>vw-8) left=Math.max(8,vw-bw-8);
  if(top+bh>vh-8)  top=Math.max(8,rect.top-bh-6);
  box.style.left=left+'px'; box.style.top=top+'px';
}
function dtpClose() {
  document.getElementById('dtpBox').classList.remove('open');
  document.getElementById('dtpOverlay').classList.remove('open');
}
function dtpClear()   { dtp.cb&&dtp.cb(''); dtpClose(); }
function dtpConfirm() {
  if(!dtp.day){showToast('Bir gün seçin');return;}
  const h=parseInt(document.getElementById('dtpHourSel').value);
  const m=parseInt(document.getElementById('dtpMinSel').value);
  dtp.cb&&dtp.cb(new Date(dtp.year,dtp.month,dtp.day,h,m).toISOString());
  dtpClose();
}
function dtpPrev(){dtp.month--;if(dtp.month<0){dtp.month=11;dtp.year--;}dtpRenderCal();}
function dtpNext(){dtp.month++;if(dtp.month>11){dtp.month=0;dtp.year++;}dtpRenderCal();}
function dtpRenderCal() {
  document.getElementById('dtpMonthLabel').textContent=`${TR_MONTHS[dtp.month]} ${dtp.year}`;
  const grid=document.getElementById('dtpGrid'); grid.innerHTML='';
  const today=new Date();
  const first=new Date(dtp.year,dtp.month,1);
  const last =new Date(dtp.year,dtp.month+1,0);
  let dow=first.getDay(); dow=dow===0?6:dow-1;
  for(let i=0;i<dow;i++){const e=document.createElement('button');e.className='dtp-day empty';grid.appendChild(e);}
  for(let d=1;d<=last.getDate();d++){
    const btn=document.createElement('button'); btn.className='dtp-day'; btn.textContent=d;
    if(d===today.getDate()&&dtp.month===today.getMonth()&&dtp.year===today.getFullYear()) btn.classList.add('today');
    if(d===dtp.day) btn.classList.add('selected');
    btn.onclick=()=>{dtp.day=d;dtpRenderCal();};
    grid.appendChild(btn);
  }
}

/* ── Email confirmation ── */
function handleConfirmation() {
  const hash=window.location.hash.substring(1); if(!hash)return false;
  const p=Object.fromEntries(new URLSearchParams(hash));
  if(p.access_token&&(p.type==='signup'||p.type==='recovery')){
    const pl=jwtPayload(p.access_token);
    saveSession({access_token:p.access_token,refresh_token:p.refresh_token,user:{id:pl.sub,email:pl.email||''}});
    history.replaceState(null,'',window.location.pathname);
    return true;
  }
  return false;
}

/* ── Board view ── */
function renderBoard() {
  try { renderStats(); } catch(e) {}
  const area = document.getElementById('boardArea');
  area.innerHTML = '';
  lists.forEach(list => area.appendChild(buildBoardCol(list)));
  restoreOpenDetails();
}

function buildBoardCol(list) {
  const colTasks = tasks.filter(t=>!t.parent_id && t.category===list.id);
  const active   = sortedActiveTasks(list.id, colTasks.filter(t=>!t.done));
  const done     = colTasks.filter(t=>t.done);

  const col = document.createElement('div');
  col.className = 'board-col';
  col.dataset.colId = list.id;

  const hdr = document.createElement('div');
  hdr.className = 'board-col-header';
  hdr.innerHTML = `
    <span class="board-col-icon">${list.icon||'📋'}</span>
    <span class="board-col-title">${list.name}</span>
    <span class="board-col-count">${active.length}</span>
  `;

  const addDiv = document.createElement('div');
  addDiv.className = 'board-col-add';
  const addInput = document.createElement('input');
  addInput.type = 'text'; addInput.placeholder = '+ Görev ekle...';
  addInput.addEventListener('keydown', async e => {
    if (e.key==='Enter') {
      const text = addInput.value.trim();
      if (!text) return;
      addInput.value = '';
      await addTaskToList(list.id, text);
    }
    if (e.key==='Escape') { addInput.value=''; addInput.blur(); }
  });
  addDiv.appendChild(addInput);

  const body = document.createElement('div');
  body.className = 'board-col-body';
  body.dataset.colId = list.id;

  active.forEach(t => {
    const card = buildTaskCard(t, false);
    initDrag(card, t);
    body.appendChild(card);
  });

  if (done.length > 0) {
    const isOpen = !!boardDoneStates[list.id];
    const doneBtn = document.createElement('button');
    doneBtn.className = 'done-toggle' + (isOpen?' open':'');
    doneBtn.innerHTML = `<span class="done-chevron">▶</span><span>Tamamlananlar</span><span class="done-badge">${done.length}</span>`;
    doneBtn.onclick = () => { boardDoneStates[list.id] = !boardDoneStates[list.id]; renderBoard(); };
    body.appendChild(doneBtn);
    if (isOpen) {
      done.forEach(t => { body.appendChild(buildTaskCard(t, true)); });
    }
  }

  col.appendChild(hdr);
  col.appendChild(addDiv);
  col.appendChild(body);
  return col;
}

async function addTaskToList(listId, text) {
  if (!text.trim()) return;
  const payload = { text:text.trim(), done:false, category:listId, sort_order:Date.now() };
  try {
    const [t] = await db('/todos',{method:'POST',body:JSON.stringify(payload)});
    tasks.unshift(t); recentlyAddedId = t.id;
    renderBoard(); renderSidebar();
  } catch(e) { showToast('Hata: '+e.message); }
}

/* ── Drag & drop ── */
function initDrag(card, task) {
  card.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('button,input,textarea,select')) return;

    const startX = e.clientX, startY = e.clientY;
    let dragging = false, ghost = null, placeholder = null, overBody = null;

    function onMove(ev) {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (!dragging) {
        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
        dragging = true;
        document.body.style.userSelect = 'none';
        const rect = card.getBoundingClientRect();
        ghost = document.createElement('div');
        ghost.className = 'drag-ghost';
        ghost.style.width  = rect.width + 'px';
        ghost.style.left   = (ev.clientX - rect.width/2) + 'px';
        ghost.style.top    = (ev.clientY - 20) + 'px';
        const row = card.querySelector('.task-row');
        if (row) ghost.appendChild(row.cloneNode(true));
        document.body.appendChild(ghost);
        card.classList.add('is-dragging');
        dragState = { task, card };
      }

      ghost.style.left = (ev.clientX - parseFloat(ghost.style.width)/2) + 'px';
      ghost.style.top  = (ev.clientY - 20) + 'px';

      if (placeholder) { placeholder.remove(); placeholder = null; }
      if (overBody)    { overBody.classList.remove('drag-over'); overBody = null; }

      ghost.style.visibility = 'hidden';
      const el = document.elementFromPoint(ev.clientX, ev.clientY);
      ghost.style.visibility = '';
      const body = el?.closest('.board-col-body');
      if (!body) return;

      overBody = body; body.classList.add('drag-over');
      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
      const colCards = [...body.querySelectorAll('.task-card:not(.is-dragging)')];
      let inserted = false;
      for (const c of colCards) {
        if (ev.clientY < c.getBoundingClientRect().top + c.getBoundingClientRect().height/2) {
          body.insertBefore(placeholder, c); inserted = true; break;
        }
      }
      if (!inserted) {
        const dt = body.querySelector('.done-toggle');
        if (dt) body.insertBefore(placeholder, dt); else body.appendChild(placeholder);
      }
    }

    async function onUp(ev) {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.body.style.userSelect = '';

      if (dragging) {
        if (ghost) ghost.style.visibility = 'hidden';
        const el = document.elementFromPoint(ev.clientX, ev.clientY);
        if (ghost) ghost.style.visibility = '';
        const body = el?.closest('.board-col-body') || overBody;
        if (body) {
          const targetListId = body.dataset.colId;
          let insertBeforeId = null;
          if (placeholder) {
            let next = placeholder.nextElementSibling;
            while (next && (!next.classList.contains('task-card') || next.classList.contains('is-dragging')))
              next = next.nextElementSibling;
            if (next?.dataset?.taskId) insertBeforeId = next.dataset.taskId;
          }
          await dropTask(task, targetListId, insertBeforeId);
        }
      }
      if (ghost)       { ghost.remove(); ghost = null; }
      if (placeholder) { placeholder.remove(); placeholder = null; }
      if (overBody)    { overBody.classList.remove('drag-over'); overBody = null; }
      card.classList.remove('is-dragging');
      dragState = null;
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

async function dropTask(task, targetListId, insertBeforeId) {
  const patch = {};
  if (task.category !== targetListId) patch.category = targetListId;

  const targetTasks = tasks
    .filter(t=>!t.parent_id && t.category===targetListId && !t.done && t.id!==task.id)
    .sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));

  let newOrder;
  if (insertBeforeId) {
    const idx = targetTasks.findIndex(t=>t.id===insertBeforeId);
    if (idx === 0) {
      newOrder = (targetTasks[0].sort_order || 1000000) - 10000;
    } else {
      const prev = targetTasks[idx-1]?.sort_order || 0;
      const next = targetTasks[idx]?.sort_order   || prev + 20000;
      newOrder = Math.floor((prev + next) / 2);
      if (newOrder === prev) newOrder = prev + 1;
    }
  } else {
    newOrder = (targetTasks[targetTasks.length-1]?.sort_order || 0) + 10000;
  }
  patch.sort_order = newOrder;

  try {
    await db(`/todos?id=eq.${task.id}`,{method:'PATCH',body:JSON.stringify(patch)});
    Object.assign(task, patch);
    renderBoard(); renderSidebar();
  } catch(e) { showToast('Hata: '+e.message); }
}

/* ── Mobile bottom sheet ── */
let mobDueValue = '', mobPriority = null;

function openMobileSheet() {
  if (!activeListId || activeListId === BOARD_LIST_ID) return;
  document.getElementById('mobSheet').classList.add('open');
  document.getElementById('mobSheetOverlay').classList.add('open');
  renderMobPrioButtons();
  setTimeout(() => document.getElementById('mobTitleInput').focus(), 320);
}
function closeMobileSheet() {
  document.getElementById('mobSheet').classList.remove('open');
  document.getElementById('mobSheetOverlay').classList.remove('open');
  document.getElementById('mobTitleInput').value = '';
  document.getElementById('mobNotesInput').value = '';
  mobDueValue = ''; mobPriority = null;
  renderMobDueLabel(); renderMobPrioButtons();
}
function renderMobDueLabel() {
  const lbl = document.getElementById('mobDueLabel');
  const btn = document.getElementById('mobDueBtn');
  if (!lbl || !btn) return;
  lbl.textContent = mobDueValue ? fmtShort(mobDueValue) : '';
  btn.classList.toggle('has-date', !!mobDueValue);
}
function renderMobPrioButtons() {
  const row = document.getElementById('mobPrioRow');
  if (!row) return;
  row.innerHTML = '';
  Object.entries(PRIORITIES).forEach(([key, prio]) => {
    const btn = document.createElement('button');
    btn.className   = `priority-btn ${key}` + (mobPriority===key?' active':'');
    btn.textContent = prio.icon; btn.title = prio.label;
    btn.style.cssText = 'width:28px;height:28px;';
    btn.onclick = (e) => {
      e.stopPropagation();
      mobPriority = mobPriority===key ? null : key;
      renderMobPrioButtons();
    };
    row.appendChild(btn);
  });
}
async function saveMobileTask() {
  const text = document.getElementById('mobTitleInput').value.trim();
  if (!text || !activeListId) { document.getElementById('mobTitleInput').focus(); return; }
  const payload = { text, done:false, category:activeListId, sort_order:Date.now() };
  const notes = document.getElementById('mobNotesInput').value.trim();
  if (notes)       payload.notes    = notes;
  if (mobDueValue) payload.due_at   = mobDueValue;
  if (mobPriority) payload.priority = mobPriority;
  closeMobileSheet();
  try {
    const [t] = await db('/todos',{method:'POST',body:JSON.stringify(payload)});
    tasks.unshift(t); recentlyAddedId = t.id;
    render(); renderSidebar();
  } catch(e) { showToast('Hata: '+e.message); }
}

/* ── Boot ── */
window.onerror = (msg, src, line, col, err) => {
  console.error('Global error:', msg, 'line:', line, err);
  showAuth();
};
window.onunhandledrejection = (e) => {
  console.error('Unhandled rejection:', e.reason);
  showAuth();
};

(async function init(){
  try {
    if (handleConfirmation()) { await initApp(); return; }
    const stored = localStorage.getItem('sb_session');
    if (stored) {
      const parsed = JSON.parse(stored);
      if (isTokenExpired(parsed.access_token)) {
        clearSession();
      } else {
        saveSession(parsed);
        await initApp();
        return;
      }
    }
  } catch(e) {
    console.error('Init error:', e);
  }
  showAuth();
})();
</script>
